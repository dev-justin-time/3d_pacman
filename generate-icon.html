<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pac-Man 3D — Icon Generator</title>
    <style>
        body { background: #111; color: #FFD700; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        h1 { margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        canvas { border: 1px solid #333; border-radius: 16px; margin-bottom: 20px; }
        .controls { display: flex; gap: 12px; margin-bottom: 30px; }
        button { background: #FFD700; color: #111; border: none; padding: 12px 28px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:hover { filter: brightness(1.15); }
        .preview { display: flex; gap: 20px; align-items: flex-end; }
        .preview-box { text-align: center; }
        .preview-box img { border-radius: 12px; border: 1px solid #333; }
        .preview-box small { color: #888; display: block; margin-top: 6px; }
    </style>
</head>
<body>
    <h1>🟡 Pac-Man 3D Icon Generator</h1>
    <p>Generates a 512×512 PNG icon with transparent background for the Puter App Store</p>

    <canvas id="iconCanvas" width="512" height="512"></canvas>

    <div class="controls">
        <button onclick="downloadIcon()">⬇ Download icon.png (512×512)</button>
    </div>

    <div class="preview">
        <div class="preview-box">
            <canvas id="prev128" width="128" height="128"></canvas>
            <small>128×128</small>
        </div>
        <div class="preview-box">
            <canvas id="prev64" width="64" height="64"></canvas>
            <small>64×64</small>
        </div>
        <div class="preview-box">
            <canvas id="prev32" width="32" height="32"></canvas>
            <small>32×32</small>
        </div>
    </div>

    <script>
    function drawIcon(canvas, size) {
        const ctx = canvas.getContext('2d');
        const s = size;
        const cx = s / 2;
        const cy = s / 2;

        // Clear with transparency
        ctx.clearRect(0, 0, s, s);

        // Rounded rectangle clip path
        const radius = s * 0.18;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(s - radius, 0);
        ctx.quadraticCurveTo(s, 0, s, radius);
        ctx.lineTo(s, s - radius);
        ctx.quadraticCurveTo(s, s, s - radius, s);
        ctx.lineTo(radius, s);
        ctx.quadraticCurveTo(0, s, 0, s - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();
        ctx.clip();

        // Dark blue gradient background
        const bgGrad = ctx.createRadialGradient(cx, cy * 0.8, 0, cx, cy, s * 0.7);
        bgGrad.addColorStop(0, '#1a2a5e');
        bgGrad.addColorStop(1, '#0a0f2a');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, s, s);

        // Subtle maze pattern in background
        ctx.strokeStyle = 'rgba(49, 74, 189, 0.15)';
        ctx.lineWidth = s * 0.012;
        const gridSize = s * 0.12;
        for (let x = gridSize; x < s; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, s);
            ctx.stroke();
        }
        for (let y = gridSize; y < s; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(s, y);
            ctx.stroke();
        }

        // Dots scattered around
        ctx.fillStyle = 'rgba(255, 217, 185, 0.4)';
        const dotPositions = [
            [0.15, 0.25], [0.30, 0.15], [0.70, 0.15], [0.85, 0.25],
            [0.15, 0.75], [0.30, 0.85], [0.70, 0.85], [0.85, 0.75],
            [0.50, 0.12], [0.50, 0.88],
            [0.12, 0.50], [0.88, 0.50],
            [0.20, 0.40], [0.80, 0.40], [0.20, 0.60], [0.80, 0.60],
        ];
        dotPositions.forEach(([dx, dy]) => {
            ctx.beginPath();
            ctx.arc(s * dx, s * dy, s * 0.015, 0, Math.PI * 2);
            ctx.fill();
        });

        // Power pellets (larger, glowing)
        ctx.fillStyle = 'rgba(255, 217, 185, 0.6)';
        [[0.15, 0.25], [0.85, 0.75], [0.15, 0.75], [0.85, 0.25]].forEach(([px, py]) => {
            ctx.beginPath();
            ctx.arc(s * px, s * py, s * 0.03, 0, Math.PI * 2);
            ctx.fill();
        });

        // Ghosts (small, in corners)
        const ghostColors = ['#FF0000', '#00FFDE', '#FFB8DE', '#FFB847'];
        const ghostPositions = [
            [0.22, 0.28, 0], [0.78, 0.28, 1], [0.22, 0.72, 2], [0.78, 0.72, 3]
        ];
        ghostPositions.forEach(([gx, gy, ci]) => {
            drawGhost(ctx, s * gx, s * gy, s * 0.075, ghostColors[ci]);
        });

        // Main Pac-Man — centered, large, eating right
        const pacRadius = s * 0.22;
        const pacX = cx - s * 0.02;
        const pacY = cy;
        const mouthAngle = Math.PI * 0.22;

        // Pac-Man glow
        const glowGrad = ctx.createRadialGradient(pacX, pacY, pacRadius * 0.5, pacX, pacY, pacRadius * 1.6);
        glowGrad.addColorStop(0, 'rgba(255, 215, 0, 0.15)');
        glowGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(pacX, pacY, pacRadius * 1.6, 0, Math.PI * 2);
        ctx.fill();

        // Pac-Man body
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(pacX, pacY, pacRadius, mouthAngle, -mouthAngle + Math.PI * 2);
        ctx.lineTo(pacX, pacY);
        ctx.closePath();
        ctx.fill();

        // Pac-Man highlight
        ctx.fillStyle = 'rgba(255, 255, 200, 0.3)';
        ctx.beginPath();
        ctx.arc(pacX - pacRadius * 0.2, pacY - pacRadius * 0.3, pacRadius * 0.25, 0, Math.PI * 2);
        ctx.fill();

        // Pac-Man eye
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(pacX + pacRadius * 0.15, pacY - pacRadius * 0.45, pacRadius * 0.09, 0, Math.PI * 2);
        ctx.fill();

        // "3D" text overlay — subtle
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.font = `bold ${s * 0.45}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('3D', cx + s * 0.05, cy + s * 0.02);

        ctx.restore();
    }

    function drawGhost(ctx, x, y, size, color) {
        ctx.fillStyle = color;

        // Ghost body (dome + wavy bottom)
        ctx.beginPath();
        ctx.arc(x, y - size * 0.15, size * 0.55, Math.PI, 0, false);
        ctx.lineTo(x + size * 0.55, y + size * 0.4);
        // Wavy bottom
        const waves = 3;
        const waveW = (size * 1.1) / waves;
        for (let i = 0; i < waves; i++) {
            const wx = x + size * 0.55 - waveW * i;
            ctx.quadraticCurveTo(wx - waveW * 0.25, y + size * 0.6, wx - waveW * 0.5, y + size * 0.4);
            ctx.quadraticCurveTo(wx - waveW * 0.75, y + size * 0.2, wx - waveW, y + size * 0.4);
        }
        ctx.closePath();
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#fff';
        const eyeOffset = size * 0.18;
        ctx.beginPath();
        ctx.ellipse(x - eyeOffset, y - size * 0.15, size * 0.14, size * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + eyeOffset, y - size * 0.15, size * 0.14, size * 0.18, 0, 0, Math.PI * 2);
        ctx.fill();

        // Pupils
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.arc(x - eyeOffset + size * 0.04, y - size * 0.12, size * 0.07, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + eyeOffset + size * 0.04, y - size * 0.12, size * 0.07, 0, Math.PI * 2);
        ctx.fill();
    }

    function downloadIcon() {
        const link = document.createElement('a');
        link.download = 'puter-app-icon-512x512.png';
        link.href = document.getElementById('iconCanvas').toDataURL('image/png');
        link.click();
    }

    // Draw all sizes
    drawIcon(document.getElementById('iconCanvas'), 512);

    // Previews
    const prev128 = document.getElementById('prev128');
    const prev64 = document.getElementById('prev64');
    const prev32 = document.getElementById('prev32');
    drawIcon(prev128, 128);
    drawIcon(prev64, 64);
    drawIcon(prev32, 32);
    </script>
</body>
</html>
