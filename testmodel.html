<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Viewer - Scale &amp; Orientation Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1a; color: #e0e0e0; font-family: 'Press Start 2P', monospace; }
  h1 { text-align: center; color: #FFD700; padding: 20px 0 6px; font-size: 20px; text-shadow: 2px 2px 4px #000; }
  .subtitle { text-align: center; color: #8899aa; font-size: 10px; margin-bottom: 16px; }
  .controls { text-align: center; margin-bottom: 16px; }
  .controls label { font-size: 10px; color: #8899aa; margin: 0 12px; cursor: pointer; }
  .controls input[type="checkbox"] { accent-color: #FFD700; }
  .controls button { background: #21265B; color: #FFD700; border: 1px solid #FFD700; border-radius: 6px; padding: 6px 14px; font-family: inherit; font-size: 10px; cursor: pointer; margin: 0 4px; }
  .controls button:hover { background: #2a3a6a; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 0 20px 40px; }
  .model-card { background: #0d1b2a; border: 2px solid #1b2838; border-radius: 12px; overflow: hidden; }
  .model-card.pacman { border-color: #FFD700; }
  .model-card.ghost { border-color: #00B8D4; }
  .model-card.error { border-color: #FF1744; }
  .model-card.loaded { border-color: #00E676; }
  .card-header { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-size: 11px; color: #FFD700; font-weight: bold; }
  .card-badge { font-size: 8px; padding: 2px 8px; border-radius: 4px; font-weight: bold; letter-spacing: 1px; }
  .badge-pacman { background: rgba(255,215,0,0.2); color: #FFD700; }
  .badge-ghost { background: rgba(0,184,212,0.2); color: #00B8D4; }
  .card-info { padding: 0 12px 8px; font-size: 8px; color: #6a7a8a; line-height: 1.6; }
  .card-info .label { color: #4a6a8a; }
  .card-info .value { color: #b0c0d0; }
  .card-info .warn { color: #FFB847; }
  .card-info .err { color: #FF1744; }
  .card-info .ok { color: #00E676; }
  .canvas-container { width: 100%; height: 200px; background: #000; position: relative; cursor: grab; }
  .canvas-container:active { cursor: grabbing; }
  .canvas-container canvas { width: 100% !important; height: 100% !important; }
  .status-badge { position: absolute; top: 6px; right: 6px; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 2; }
  .status-loading { background: rgba(255,215,0,0.3); color: #FFD700; }
  .status-loaded { background: rgba(0,230,118,0.3); color: #00E676; }
  .status-error { background: rgba(255,23,68,0.3); color: #FF1744; }
  .status-builtin { background: rgba(136,153,170,0.3); color: #8899aa; }
  .section-header { font-size: 16px; color: #FFD700; padding: 16px 20px 8px; border-bottom: 1px solid #1b2838; margin: 0 20px 16px; letter-spacing: 2px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<h1>PAC-MAN 3D — Model Viewer</h1>
<p class="subtitle">All 3D models rendered with the same scale &amp; rotation as in-game</p>
<div class="controls">
  <label><input type="checkbox" id="autoRotate" checked> Auto-Rotate</label>
  <label><input type="checkbox" id="showWireframe"> Wireframe</label>
  <label><input type="checkbox" id="showGrid" checked> Grid Floor</label>
  <button id="resetBtn">Reset View</button>
  <button id="reloadBtn">Reload All</button>
</div>

<div class="section-header">🟡 PAC-MAN MODELS</div>
<div class="grid" id="pacman-grid"></div>

<div class="section-header">👻 GHOST MODELS</div>
<div class="grid" id="ghost-grid"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Constants matching the game ────────────────────────────
const PACMAN_RADIUS = 0.25;
const GHOST_RADIUS = PACMAN_RADIUS * 1.25;
const PACMAN_SCALE = PACMAN_RADIUS * 2;   // 0.5
const GHOST_SCALE = GHOST_RADIUS * 1.8;   // 0.45
const ROTATION_X = -Math.PI / 2;          // Y-up (Sketchfab) → Z-up (game world)

// ─── Model Definitions (from asset-manager.js) ──────────────
const PACMAN_MODELS = [
  { id: 'classic', name: 'Classic Sphere', path: null, type: 'builtin', description: 'Original geometric pac-man' },
  { id: 'yellow', name: 'Yellow Pac-Man', path: 'assets/models/pacman/yellow', type: 'gltf', description: 'Yellow pac-man 3D model' },
  { id: 'robo', name: 'Robot Pac-Man', path: 'assets/models/pacman/robo', type: 'gltf', description: 'Robot-style pac-man' },
  { id: 'girl', name: 'Girl Pac-Man', path: 'assets/models/pacman/girl_pacman_animated/girl_pacman_animated', type: 'gltf', description: 'Animated girl pac-man' },
  { id: 'pixel', name: 'Pixel Pac-Man', path: 'assets/models/pacman/pac_man_pixels/pixel', type: 'gltf', description: 'Pixel art style pac-man' },
  { id: 'rockin', name: "Rock 'n Roll Pac-Man", path: 'assets/models/pacman/pac_n_roll/rockinpm', type: 'gltf', description: 'Rock and roll themed' },
  { id: 'pacManExtract', name: 'Pac-Man (Extract)', path: 'assets/models/pacman/pac_man/scene', type: 'gltf', description: 'Extracted from character pack' },
  { id: 'robotPac', name: 'Robot Pac-Man v2', path: 'assets/models/pacman/robot_pac-man/scene', type: 'gltf', description: 'Robot pac-man variant' },
  { id: 'pinkyPac', name: 'Pinky Pac-Man', path: 'assets/models/ghost/pinky/scene', type: 'gltf', description: 'Pinky character as pac-man' },
  { id: 'inkyPac', name: 'Inky Pac-Man', path: 'assets/models/ghost/inky', type: 'gltf', description: 'Inky as pac-man' },
  { id: 'bluePac', name: 'Blue Ghost Pac-Man', path: 'assets/models/ghost/blue_ghost/blue', type: 'gltf', description: 'Blue ghost as pac-man' },
  { id: 'candyPac', name: 'Candy Pac-Man', path: 'assets/models/ghost/candy_monsters/candy', type: 'gltf', description: 'Candy monster as pac-man' },
];

const GHOST_MODELS = [
  { id: 'classic', name: 'Classic Sphere', path: null, type: 'builtin', description: 'Original geometric ghost' },
  { id: 'inky', name: 'Inky (Blue Ghost)', path: 'assets/models/ghost/inky', type: 'gltf', description: 'Blue ghost with animated eyes' },
  { id: 'blueGhost', name: 'Blue Ghost Character', path: 'assets/models/ghost/blue_ghost/blue', type: 'gltf', description: 'Blue ghost character model' },
  { id: 'pinky', name: 'Pinky Ghost', path: 'assets/models/ghost/pinky/scene', type: 'gltf', description: 'Pinky the pink ghost' },
  { id: 'candy', name: 'Candy Monsters', path: 'assets/models/ghost/candy_monsters/candy', type: 'gltf', description: 'Candy-colored ghost monsters' },
];

const GHOST_COLORS = ['#FF0000', '#00FFDE', '#FFB8DE', '#FFB847'];

// ─── loadSketchfabModel (replicated from asset-manager.js) ──
function loadSketchfabModel(gltfPath, loader, onLoad, onProgress, onError) {
  const fullPath = gltfPath + '.gltf';
  const binPath = gltfPath + '.bin';
  const normalized = gltfPath.replace(/\\/g, '/');
  const lastSlash = normalized.lastIndexOf('/');
  const directory = lastSlash >= 0 ? normalized.substring(0, lastSlash + 1) : '';
  const binFilename = binPath.replace(/\\/g, '/').split('/').pop();
  const gltfFilename = fullPath.replace(/\\/g, '/').split('/').pop();
  const previousPath = loader._currentPath || loader.path || '';

  function setModelPath() {
    if (directory) loader.setPath(directory); else loader.setPath('');
  }

  fetch(fullPath)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status} loading ${fullPath}`);
      return res.text();
    })
    .then(gltfText => {
      const gltfJson = JSON.parse(gltfText);
      let needsPatch = false;
      if (gltfJson.buffers) {
        for (const buf of gltfJson.buffers) {
          if (buf.uri && buf.uri !== binFilename && buf.uri.endsWith('.bin')) {
            buf.uri = binFilename;
            needsPatch = true;
          }
        }
      }
      if (needsPatch) {
        loader.parse(JSON.stringify(gltfJson), directory, function(gltf) {
          loader.setPath(previousPath);
          onLoad(gltf);
        }, function(err) {
          setModelPath();
          loader.load(gltfFilename, function(gltf) {
            loader.setPath(previousPath); onLoad(gltf);
          }, onProgress, function(err2) {
            loader.setPath(previousPath); if (onError) onError(err2);
          });
        });
      } else {
        setModelPath();
        loader.load(gltfFilename, function(gltf) {
          loader.setPath(previousPath); onLoad(gltf);
        }, onProgress, function(err) {
          loader.setPath(previousPath); if (onError) onError(err);
        });
      }
    })
    .catch(function(err) {
      setModelPath();
      loader.load(gltfFilename, function(gltf) {
        loader.setPath(previousPath); onLoad(gltf);
      }, onProgress, function(err2) {
        loader.setPath(previousPath); if (onError) onError(err2);
      });
    });
}

// ─── Model Card Creator ─────────────────────────────────────
function createModelCard(model, type) {
  const card = document.createElement('div');
  card.className = `model-card ${type}`;
  const badgeClass = type === 'pacman' ? 'badge-pacman' : 'badge-ghost';
  const badgeLabel = type === 'pacman' ? 'PAC-MAN' : 'GHOST';
  const scale = type === 'pacman' ? PACMAN_SCALE : GHOST_SCALE;

  card.innerHTML = `
    <div class="card-header">
      <span class="card-title">${model.name}</span>
      <span class="card-badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="card-info" id="info-${type}-${model.id}">
      <span class="label">ID:</span> <span class="value">${model.id}</span> |
      <span class="label">Type:</span> <span class="value">${model.type}</span><br>
      <span class="label">Scale:</span> <span class="value">${scale.toFixed(3)}</span> |
      <span class="label">Rot X:</span> <span class="value">-90°</span><br>
      ${model.path ? `<span class="label">Path:</span> <span class="value" style="font-size:7px;">${model.path}</span>` : ''}
    </div>
    <div class="canvas-container" id="canvas-${type}-${model.id}">
      <span class="status-badge status-loading" id="status-${type}-${model.id}">LOADING...</span>
    </div>
  `;
  return card;
}

// ─── Scene Setup Per Card ────────────────────────────────────
const scenes = [];
let wireframeMode = false;
let autoRotate = true;
let showGrid = true;

function setupCardScene(model, type, container) {
  const width = 280;
  const height = 200;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.add(new THREE.AmbientLight(0x888888));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(2, 3, 4);
  scene.add(dirLight);
  const backLight = new THREE.DirectionalLight(0x4466ff, 0.3);
  backLight.position.set(-2, -1, -3);
  scene.add(backLight);

  // Grid floor
  const gridHelper = new THREE.GridHelper(2, 10, 0x333355, 0x222244);
  scene.add(gridHelper);

  const camera = new THREE.PerspectiveCamera(50, width / height, 0.01, 100);
  camera.position.set(1.5, 1.0, 1.5);
  camera.lookAt(0, 0, 0);

  const scale = type === 'pacman' ? PACMAN_SCALE : GHOST_SCALE;

  // Load model
  if (model.type === 'builtin') {
    // Classic sphere
    const radius = type === 'pacman' ? PACMAN_RADIUS : GHOST_RADIUS;
    const color = type === 'pacman' ? 0xFFFF00 : parseInt(GHOST_COLORS[scenes.filter(s => s.type === 'ghost').length % GHOST_COLORS.length].replace('#', '0x'));
    const geo = new THREE.SphereGeometry(radius, 16, 16);
    const mat = new THREE.MeshPhongMaterial({ color, transparent: true, opacity: 0.9 });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    updateStatus(type, model.id, 'builtin');
  } else {
    const loader = new GLTFLoader();
    loadSketchfabModel(model.path, loader, (gltf) => {
      const gltfScene = gltf.scene;
      gltfScene.scale.set(scale, scale, scale);
      gltfScene.rotation.x = ROTATION_X;
      scene.add(gltfScene);

      // Compute bounding box info
      const box = new THREE.Box3().setFromObject(gltfScene);
      const size = new THREE.Vector3();
      box.getSize(size);
      const center = new THREE.Vector3();
      box.getCenter(center);

      // Update info
      const infoEl = document.getElementById(`info-${type}-${model.id}`);
      if (infoEl) {
        const sizeStr = `${size.x.toFixed(2)}×${size.y.toFixed(2)}×${size.z.toFixed(2)}`;
        const posStr = `${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)}`;
        infoEl.innerHTML += `
          <span class="label">BBox:</span> <span class="value">${sizeStr}</span><br>
          <span class="label">Center:</span> <span class="value">${posStr}</span>
        `;
      }
      updateStatus(type, model.id, 'loaded');
    }, undefined, (err) => {
      console.warn(`Failed to load ${model.id}:`, err);
      updateStatus(type, model.id, 'error');
    });
  }

  // Mouse orbit
  let isDragging = false;
  let prevX = 0, prevY = 0;
  let angleX = 0.4, angleY = 0.6;
  const radius = 2;

  container.addEventListener('pointerdown', (e) => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  window.addEventListener('pointerup', () => { isDragging = false; });
  container.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    angleY += (e.clientX - prevX) * 0.01;
    angleX += (e.clientY - prevY) * 0.01;
    angleX = Math.max(-1.5, Math.min(1.5, angleX));
    prevX = e.clientX; prevY = e.clientY;
  });

  // Scroll to zoom
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    camera.position.multiplyScalar(e.deltaY > 0 ? 1.1 : 0.9);
  }, { passive: false });

  const sceneData = { renderer, scene, camera, gridHelper, type, model, angleX, angleY, radius, isDragging: () => isDragging };
  scenes.push(sceneData);
  return sceneData;
}

function updateStatus(type, id, status) {
  const el = document.getElementById(`status-${type}-${id}`);
  if (!el) return;
  el.className = 'status-badge';
  if (status === 'loaded') { el.textContent = '✓ LOADED'; el.classList.add('status-loaded'); }
  else if (status === 'error') { el.textContent = '✗ ERROR'; el.classList.add('status-error'); }
  else if (status === 'builtin') { el.textContent = '● BUILTIN'; el.classList.add('status-builtin'); }
  // Also update card border
  const card = el.closest('.model-card');
  if (card) {
    card.classList.remove('loaded', 'error');
    if (status === 'loaded') card.classList.add('loaded');
    else if (status === 'error') card.classList.add('error');
  }
}

// ─── Build UI ────────────────────────────────────────────────
const pacmanGrid = document.getElementById('pacman-grid');
const ghostGrid = document.getElementById('ghost-grid');

PACMAN_MODELS.forEach(model => {
  const card = createModelCard(model, 'pacman');
  pacmanGrid.appendChild(card);
  setupCardScene(model, 'pacman', card.querySelector('.canvas-container'));
});

GHOST_MODELS.forEach(model => {
  const card = createModelCard(model, 'ghost');
  ghostGrid.appendChild(card);
  setupCardScene(model, 'ghost', card.querySelector('.canvas-container'));
});

// ─── Controls ────────────────────────────────────────────────
document.getElementById('autoRotate').addEventListener('change', (e) => { autoRotate = e.target.checked; });
document.getElementById('showWireframe').addEventListener('change', (e) => {
  wireframeMode = e.target.checked;
  scenes.forEach(s => {
    s.scene.traverse(obj => {
      if (obj.isMesh && obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.wireframe = wireframeMode);
        else obj.material.wireframe = wireframeMode;
      }
    });
  });
});
document.getElementById('showGrid').addEventListener('change', (e) => {
  showGrid = e.target.checked;
  scenes.forEach(s => { s.gridHelper.visible = showGrid; });
});
document.getElementById('resetBtn').addEventListener('click', () => {
  scenes.forEach(s => {
    s.angleX = 0.4; s.angleY = 0.6;
    s.camera.position.set(1.5, 1.0, 1.5);
  });
});
document.getElementById('reloadBtn').addEventListener('click', () => { location.reload(); });

// ─── Animation Loop ──────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const time = performance.now() * 0.001;

  scenes.forEach(s => {
    if (autoRotate && !s.isDragging()) {
      s.angleY += 0.008;
    }
    const camX = s.radius * Math.cos(s.angleX) * Math.sin(s.angleY);
    const camY = s.radius * Math.sin(s.angleX) + 0.5;
    const camZ = s.radius * Math.cos(s.angleX) * Math.cos(s.angleY);
    s.camera.position.set(camX, camY, camZ);
    s.camera.lookAt(0, 0, 0);
    s.renderer.render(s.scene, s.camera);
  });
}
animate();
</script>
</body>
</html>
