<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat-Head Pac-Man Map — 3D Glass Floor Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }

        #info {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 13px;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        #info small { display: block; color: #8899aa; font-size: 9px; letter-spacing: 1px; margin-top: 4px; }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        #controls button {
            padding: 8px 16px;
            border: 1px solid #3a6a9a;
            border-radius: 6px;
            background: rgba(13,27,42,0.85);
            color: #e0e0e0;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        #controls button:hover { border-color: #FFD700; color: #FFD700; }
        #controls button.active { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.1); }

        #hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: #6a7a8a;
            font-size: 10px;
            z-index: 10;
            letter-spacing: 1px;
            pointer-events: none;
            animation: fadeHint 4s ease-in-out forwards;
        }
        @keyframes fadeHint {
            0%, 60% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="info">🐱 CAT-HEAD GLASS MAP<small>4 floors · 8 neon colors · Pac-Man ready</small></div>
    <div id="hint">🖱 Drag to orbit · Scroll to zoom · Right-drag to pan</div>
    <div id="controls">
        <button id="btn-rotate" class="active" title="Auto-rotate camera">⟳ Auto-Rotate</button>
        <button id="btn-top" title="Top-down view">⏫ Top</button>
        <button id="btn-front" title="Front view">⏩ Front</button>
        <button id="btn-side" title="Side view">⏭ Side</button>
        <button id="btn-reset" title="Reset camera">↺ Reset</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { createCatHeadMap, updateCatHeadMap } from './floors.js';

        // ── Scene Setup ──────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        // Subtle starfield background
        const starsGeom = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 60;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
        }
        starsGeom.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0x8899cc, size: 0.04, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starsGeom, starsMat);
        scene.add(stars);

        // Ambient + directional lighting
        scene.add(new THREE.AmbientLight(0x334466, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(10, 15, 8);
        scene.add(dirLight);

        // ── Camera ──────────────────────────────────────────────────────
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 80);
        camera.position.set(12, 4, 14);
        camera.lookAt(0, 1, 0);

        // ── Renderer ────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ── Orbit Controls ──────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 4;
        controls.maxDistance = 30;
        controls.maxPolarAngle = Math.PI * 0.75;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.update();

        // ── Create the Cat-Head Map ─────────────────────────────────────
        const map = createCatHeadMap(scene, {
            levels: 4,
            spacing: 3.0,
            baseY: -3,
            scale: 3.0,
            glassOpacity: 0.10,
            showMaze: true,
            showDots: true,
            showLegend: true,
            animated: true,
        });

        console.log('Cat-Head Map created:', {
            levels: map.levels,
            spacing: map.spacing,
            gridRows: map.group ? 'ready' : 'none',
            legend: map.legend ? 'ready' : 'none',
        });

        // ── Render Loop ─────────────────────────────────────────────────
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1);
            const elapsed = performance.now() / 1000;

            controls.update();
            updateCatHeadMap(map, delta, elapsed);

            // Subtle star rotation
            stars.rotation.y += delta * 0.03;
            stars.rotation.x += delta * 0.01;

            renderer.render(scene, camera);
        }
        animate();

        // ── Resize ──────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── UI Controls ─────────────────────────────────────────────────
        const btnRotate = document.getElementById('btn-rotate');
        const btnTop = document.getElementById('btn-top');
        const btnFront = document.getElementById('btn-front');
        const btnSide = document.getElementById('btn-side');
        const btnReset = document.getElementById('btn-reset');

        btnRotate.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            btnRotate.classList.toggle('active', controls.autoRotate);
        });

        let camAnimId = null;

        function animateCamera(pos, target, duration = 1.2) {
            if (camAnimId) cancelAnimationFrame(camAnimId);
            const startPos = camera.position.clone();
            const startTarget = controls.target.clone();
            const endPos = new THREE.Vector3(...pos);
            const endTarget = new THREE.Vector3(...target);
            const startTime = performance.now() / 1000;

            function step() {
                const t = (performance.now() / 1000 - startTime) / duration;
                if (t >= 1) {
                    camera.position.copy(endPos);
                    controls.target.copy(endTarget);
                    controls.update();
                    camAnimId = null;
                    return;
                }
                const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                camera.position.lerpVectors(startPos, endPos, ease);
                controls.target.lerpVectors(startTarget, endTarget, ease);
                controls.update();
                camAnimId = requestAnimationFrame(step);
            }
            camAnimId = requestAnimationFrame(step);
        }

        btnTop.addEventListener('click', () => animateCamera([0, 16, 0.1], [0, 1, 0]));
        btnFront.addEventListener('click', () => animateCamera([0, 1, 16], [0, 1, 0]));
        btnSide.addEventListener('click', () => animateCamera([16, 1, 0], [0, 1, 0]));
        btnReset.addEventListener('click', () => animateCamera([12, 4, 14], [0, 1, 0]));

        // ── Keyboard shortcuts ──────────────────────────────────────────
        window.addEventListener('keydown', (e) => {
            switch (e.key.toLowerCase()) {
                case 'r': controls.autoRotate = !controls.autoRotate; btnRotate.classList.toggle('active', controls.autoRotate); break;
                case 't': animateCamera([0, 16, 0.1], [0, 1, 0]); break;
                case 'f': animateCamera([0, 1, 16], [0, 1, 0]); break;
                case 's': animateCamera([16, 1, 0], [0, 1, 0]); break;
                case '0': animateCamera([12, 4, 14], [0, 1, 0]); break;
            }
        });

        console.log('🐱 Cat-Head Map Demo ready — drag to orbit, scroll to zoom');
        console.log('  Keys: R=toggle rotate  T=top  F=front  S=side  0=reset');
    </script>
</body>
</html>
