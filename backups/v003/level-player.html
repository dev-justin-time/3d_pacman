<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Player — PAC-MAN 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #FFD700; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: rgba(0,0,0,0.85);
    border-bottom: 1px solid #333; flex-wrap: wrap;
  }
  #toolbar label { font-size: 14px; color: #aaa; }
  #toolbar select, #toolbar input {
    background: #1a1a2e; color: #FFD700; border: 1px solid #444;
    border-radius: 6px; padding: 4px 8px; font-size: 14px;
  }
  #toolbar button {
    background: #21265B; color: #FFD700; border: none; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; cursor: pointer; font-weight: bold;
  }
  #toolbar button:hover { background: #2d3570; }
  #toolbar button.active { background: #FFD700; color: #111; }
  #info {
    position: fixed; bottom: 10px; left: 10px; z-index: 100;
    font-size: 12px; color: #888; pointer-events: none;
  }
  #level-info {
    position: fixed; top: 52px; right: 10px; z-index: 100;
    font-size: 13px; color: #aaa; text-align: right; pointer-events: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<div id="toolbar">
  <label>Level:</label>
  <select id="levelSelect"></select>
  <label>Source:</label>
  <select id="sourceSelect">
    <option value="regular">Regular Levels</option>
    <option value="challenge">Challenge Levels</option>
  </select>
  <button id="btnRotate" class="active" onclick="toggleRotation()">Auto-Rotate</button>
  <button onclick="resetCamera()">Reset View</button>
  <label>Speed:</label>
  <input id="rotSpeed" type="range" min="0.1" max="5" step="0.1" value="0.5" style="width:80px">
</div>
<div id="level-info"></div>
<div id="info">Drag to orbit • Scroll to zoom • Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { LEVELS } from './levels.js';
import { CHALLENGE_LEVELS } from './challenge-levels.js';

// ── Config ──────────────────────────────────────────────────────────────
const WALL_COLOR = 0x314ABD;
const WALL_OPACITY = 0.55;
const DOT_COLOR = 0xFFD9B9;
const DOT_RADIUS = 0.05;
const PELLET_RADIUS = DOT_RADIUS * 2;
const GHOST_SPAWN_COLOR = 0xFF0000;
const PAC_SPAWN_COLOR = 0xFFFF00;

// ── Renderer Setup ──────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x000011, 1.0);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.add(new THREE.AmbientLight(0x888888));
const spotLight = new THREE.SpotLight(0xFFFFFF, 0.6);
spotLight.position.set(0, 0, 50);
scene.add(spotLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight.position.set(5, 5, 10);
scene.add(dirLight);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 20);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.target.set(0, 0, 0);

// ── Geometry Cache (shared) ──────────────────────────────────────────────
const wallGeo = new THREE.BoxGeometry(1, 1, 1);
const wallMat = new THREE.MeshLambertMaterial({ color: WALL_COLOR, transparent: true, opacity: WALL_OPACITY });
const dotGeo = new THREE.SphereGeometry(DOT_RADIUS, 8, 6);
const dotMat = new THREE.MeshPhongMaterial({ color: DOT_COLOR, emissive: 0x332200 });
const pelletGeo = new THREE.SphereGeometry(PELLET_RADIUS, 12, 8);
const pelletMat = new THREE.MeshPhongMaterial({ color: DOT_COLOR, emissive: 0x553300 });
const spawnMarkerGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.05, 16);

// ── State ────────────────────────────────────────────────────────────────
let currentLevelGroup = null;
let autoRotate = true;
let currentSource = 'regular';

function clearLevel() {
  if (currentLevelGroup) {
    scene.remove(currentLevelGroup);
    // Dispose geometries in the group
    currentLevelGroup.traverse(obj => {
      if (obj.isMesh) {
        if (obj.geometry !== wallGeo && obj.geometry !== dotGeo &&
            obj.geometry !== pelletGeo && obj.geometry !== spawnMarkerGeo) {
          obj.geometry.dispose();
        }
        if (obj.material && obj.material !== wallMat && obj.material !== dotMat &&
            obj.material !== pelletMat) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      }
    });
    currentLevelGroup = null;
  }
}

function buildLevel(levelDef, levelIndex) {
  clearLevel();
  const group = new THREE.Group();
  group.name = `Level ${levelIndex + 1}`;

  let numDots = 0, numPellets = 0;
  let pacSpawn = null, ghostSpawn = null;
  let maxX = 0, maxY = 0;

  for (let row = 0; row < levelDef.length; row++) {
    const y = -row;
    const lineLen = Math.floor(levelDef[row].length / 2);
    maxX = Math.max(maxX, lineLen);

    for (let col = 0; col < levelDef[row].length; col += 2) {
      const x = Math.floor(col / 2);
      const cell = levelDef[row][col];

      if (cell === '#') {
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(x, y, 0);
        group.add(wall);
      } else if (cell === '.') {
        const dot = new THREE.Mesh(dotGeo, dotMat);
        dot.position.set(x, y, 0);
        group.add(dot);
        numDots++;
      } else if (cell === 'o') {
        const pellet = new THREE.Mesh(pelletGeo, pelletMat);
        pellet.position.set(x, y, 0);
        group.add(pellet);
        numPellets++;
      } else if (cell === 'P') {
        pacSpawn = new THREE.Vector3(x, y, 0);
      } else if (cell === 'G') {
        ghostSpawn = new THREE.Vector3(x, y, 0);
      }
    }
    maxY = Math.max(maxY, row);
  }

  // Spawn markers
  if (pacSpawn) {
    const marker = new THREE.Mesh(spawnMarkerGeo, new THREE.MeshPhongMaterial({ color: PAC_SPAWN_COLOR, emissive: 0x444400 }));
    marker.position.copy(pacSpawn);
    marker.position.z = 0.05;
    group.add(marker);
    const indicator = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 8), new THREE.MeshPhongMaterial({ color: 0xFFFF00 }));
    indicator.position.copy(pacSpawn);
    indicator.position.z = 0.5;
    indicator.userData.isSpawnIndicator = true;
    group.add(indicator);
  }
  if (ghostSpawn) {
    const marker = new THREE.Mesh(spawnMarkerGeo, new THREE.MeshPhongMaterial({ color: GHOST_SPAWN_COLOR, emissive: 0x440000 }));
    marker.position.copy(ghostSpawn);
    marker.position.z = 0.05;
    group.add(marker);
    const indicator = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 8), new THREE.MeshPhongMaterial({ color: 0xFF0000 }));
    indicator.position.copy(ghostSpawn);
    indicator.position.z = 0.5;
    indicator.userData.isSpawnIndicator = true;
    group.add(indicator);
  }

  // Center the group
  const centerX = maxX / 2;
  const centerY = -maxY / 2;
  group.position.set(-centerX, -centerY, 0);

  scene.add(group);
  currentLevelGroup = group;

  // Update camera target to center of level
  controls.target.set(0, 0, 0);

  // Fit camera to level size
  const levelWidth = maxX;
  const levelHeight = maxY + 1;
  const maxDim = Math.max(levelWidth, levelHeight);
  const fov = camera.fov * (Math.PI / 180);
  let dist = (maxDim / 2) / Math.tan(fov / 2);
  dist = Math.max(dist * 1.3, 8); // padding
  camera.position.set(dist * 0.3, -dist * 0.3, dist);

  // Update info
  const infoEl = document.getElementById('level-info');
  infoEl.innerHTML = `Level ${levelIndex + 1}<br>Size: ${maxX}×${maxY + 1}<br>Dots: ${numDots} | Pellets: ${numPellets}`;

  // Update title
  document.title = `Level ${levelIndex + 1} — Level Player`;
}

// ── Populate selectors ───────────────────────────────────────────────────
const levelSelect = document.getElementById('levelSelect');
const sourceSelect = document.getElementById('sourceSelect');

function populateLevels() {
  const src = sourceSelect.value;
  const levels = src === 'challenge' ? CHALLENGE_LEVELS : LEVELS;
  levelSelect.innerHTML = '';
  levels.forEach((_, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = src === 'challenge' ? `Challenge ${i + 1}` : `Level ${i + 1}`;
    levelSelect.appendChild(opt);
  });
  currentSource = src;
  loadLevel(0);
}

function loadLevel(idx) {
  const levels = currentSource === 'challenge' ? CHALLENGE_LEVELS : LEVELS;
  if (idx >= 0 && idx < levels.length) {
    buildLevel(levels[idx], idx);
  }
}

levelSelect.addEventListener('change', () => loadLevel(parseInt(levelSelect.value)));
sourceSelect.addEventListener('change', populateLevels);
document.getElementById('rotSpeed').addEventListener('input', (e) => {
  controls.autoRotateSpeed = parseFloat(e.target.value);
});

// ── Keyboard shortcuts ───────────────────────────────────────────────────
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    levelSelect.selectedIndex = Math.min(levelSelect.selectedIndex + 1, levelSelect.options.length - 1);
    loadLevel(parseInt(levelSelect.value));
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    levelSelect.selectedIndex = Math.max(levelSelect.selectedIndex - 1, 0);
    loadLevel(parseInt(levelSelect.value));
  } else if (e.key === 'r' || e.key === 'R') {
    toggleRotation();
  } else if (e.key === ' ') {
    e.preventDefault();
    resetCamera();
  }
});

// ── Button handlers ──────────────────────────────────────────────────────
window.toggleRotation = function() {
  autoRotate = !autoRotate;
  controls.autoRotate = autoRotate;
  document.getElementById('btnRotate').classList.toggle('active', autoRotate);
};

window.resetCamera = function() {
  const levels = currentSource === 'challenge' ? CHALLENGE_LEVELS : LEVELS;
  const idx = parseInt(levelSelect.value);
  if (idx >= 0 && idx < levels.length) {
    buildLevel(levels[idx], idx);
  }
};

// ── Dynamic resize ───────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animation loop ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Animate spawn indicators (bob up and down)
  if (currentLevelGroup) {
    const t = Date.now() * 0.003;
    currentLevelGroup.children.forEach(child => {
      if (child.userData && child.userData.isSpawnIndicator) {
        child.position.z = 0.5 + Math.sin(t) * 0.15;
      }
    });
  }

  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────────────────────────
populateLevels();
animate();
</script>
</body>
</html>
